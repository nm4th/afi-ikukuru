name: テスト投稿（1本だけ即投稿）

on:
  workflow_dispatch:
    inputs:
      format:
        description: '形式'
        required: true
        default: 'straight'
        type: choice
        options:
          - tease
          - straight
          - tier
          - compat
          - full16
          - contrast
          - metaphor
          - mumble
      theme:
        description: 'テーマ（mumble以外で必要）'
        required: false
        default: '好きな人の前で挙動不審になるMBTI'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r generator/requirements.txt

      - name: Generate 1 tweet
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: generator
        run: |
          FORMAT="${{ github.event.inputs.format }}"
          THEME="${{ github.event.inputs.theme }}"

          if [ "$FORMAT" = "mumble" ]; then
            python -c "
          from generate import generate_mumble, parse_single_tweet
          import json
          raw = generate_mumble()
          print(raw)
          parsed = parse_single_tweet(raw)
          tweet = [{'slot': 'test', 'theme': 'mumble', 'format': 'mumble', 'main': parsed['main'], 'reply': ''}]
          open('../tweets.json', 'w').write(json.dumps(tweet, ensure_ascii=False, indent=2))
          "
          else
            python -c "
          from generate import generate_ranking, parse_tease, parse_single_tweet, TEASE_LIKE_FORMATS
          import json
          fmt = '$FORMAT'
          theme = '''$THEME'''
          raw = generate_ranking(theme, fmt)
          print(raw)
          parsed = parse_tease(raw) if fmt in TEASE_LIKE_FORMATS else parse_single_tweet(raw)
          tweet = [{'slot': 'test', 'theme': theme, 'format': fmt, 'main': parsed['main'], 'reply': parsed['reply']}]
          open('../tweets.json', 'w').write(json.dumps(tweet, ensure_ascii=False, indent=2))
          "
          fi

      - name: Show generated tweet
        run: |
          echo "=== 生成結果 ==="
          cat tweets.json | python3 -m json.tool

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python generator/post.py tweets.json --slot test
