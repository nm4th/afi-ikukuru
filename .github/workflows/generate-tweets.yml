name: ツイート生成・投稿

on:
  schedule:
    # 毎日 22:00 JST（13:00 UTC）に翌日分を生成
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r generator/requirements.txt

      - name: Generate tweets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: generator
        run: python generate.py daily --output-json ../tweets.json | tee ../output.txt

      - name: Upload tweets JSON
        uses: actions/upload-artifact@v4
        with:
          name: tweets
          path: tweets.json

      - name: Create issue with results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(TZ=Asia/Tokyo date '+%Y-%m-%d')
          BODY=$(cat output.txt)
          gh issue create \
            --title "📝 ${DATE} ツイート生成結果" \
            --body "$(cat <<EOF
          ## ${DATE} のツイート

          \`\`\`
          ${BODY}
          \`\`\`

          ---
          ⏰ 投稿スケジュール: 7:30 / 12:15 / 18:30 / 21:30 / 23:00
          EOF
          )"

      - name: Commit history updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d history ] && [ -n "$(git status history --porcelain)" ]; then
            git add history/
            git commit -m "update tweet history $(TZ=Asia/Tokyo date '+%Y-%m-%d')"
            git push
          fi

  # --- 時間差投稿ジョブ（5スロット） ---
  post-0730:
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r generator/requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: tweets
      - name: Wait until 07:30 JST
        run: |
          TARGET=$(TZ=Asia/Tokyo date -d 'tomorrow 07:30' +%s 2>/dev/null || \
                   TZ=Asia/Tokyo date -j -v+1d -f '%H:%M' '07:30' +%s 2>/dev/null || echo 0)
          NOW=$(date +%s)
          WAIT=$((TARGET - NOW))
          if [ "$WAIT" -gt 0 ] && [ "$WAIT" -lt 43200 ]; then
            echo "Waiting ${WAIT}s until 07:30 JST..."
            sleep "$WAIT"
          fi
      - name: Post 07:30 tweet
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python generator/post.py tweets.json --slot 07:30

