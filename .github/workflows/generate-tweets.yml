name: ツイート生成・投稿

on:
  schedule:
    - cron: '30 15 * * *'  # 00:30 JST - 生成
    - cron: '30 22 * * *'  # 07:30 JST - 投稿
    - cron: '0 0 * * *'    # 09:00 JST - 投稿
    - cron: '15 3 * * *'   # 12:15 JST - 投稿
    - cron: '0 6 * * *'    # 15:00 JST - 投稿
    - cron: '30 9 * * *'   # 18:30 JST - 投稿
    - cron: '30 10 * * *'  # 19:30 JST - 投稿
    - cron: '30 11 * * *'  # 20:30 JST - 投稿
    - cron: '30 12 * * *'  # 21:30 JST - 投稿
    - cron: '30 13 * * *'  # 22:30 JST - 投稿
    - cron: '0 14 * * *'   # 23:00 JST - 投稿
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  generate:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 15 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r generator/requirements.txt

      - name: Generate tweets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: generator
        run: python generate.py daily --output-json ../tweets.json | tee ../output.txt

      - name: Commit tweets and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tweets.json
          if [ -d history ] && [ -n "$(git status history --porcelain)" ]; then
            git add history/
          fi
          git commit -m "generate tweets $(TZ=Asia/Tokyo date '+%Y-%m-%d')" || echo "変更なし"
          git push

      - name: Create issue with results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(TZ=Asia/Tokyo date '+%Y-%m-%d')
          gh issue create \
            --title "📝 ${DATE} ツイート生成結果" \
            --body "$(cat <<EOF
          ## ${DATE} のツイート

          \`\`\`
          $(cat output.txt)
          \`\`\`

          ---
          ⏰ 投稿スケジュール: 7:30 / 9:00 / 12:15 / 15:00 / 18:30 / 19:30 / 20:30 / 21:30 / 22:30 / 23:00
          EOF
          )"

  post:
    if: |
      github.event.schedule == '30 22 * * *' ||
      github.event.schedule == '0 0 * * *'   ||
      github.event.schedule == '15 3 * * *'  ||
      github.event.schedule == '0 6 * * *'   ||
      github.event.schedule == '30 9 * * *'  ||
      github.event.schedule == '30 10 * * *' ||
      github.event.schedule == '30 11 * * *' ||
      github.event.schedule == '30 12 * * *' ||
      github.event.schedule == '30 13 * * *' ||
      github.event.schedule == '0 14 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r generator/requirements.txt

      - name: Post tweet for current slot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          case "$SCHEDULE" in
            '30 22 * * *') SLOT="07:30" ;;
            '0 0 * * *')   SLOT="09:00" ;;
            '15 3 * * *')  SLOT="12:15" ;;
            '0 6 * * *')   SLOT="15:00" ;;
            '30 9 * * *')  SLOT="18:30" ;;
            '30 10 * * *') SLOT="19:30" ;;
            '30 11 * * *') SLOT="20:30" ;;
            '30 12 * * *') SLOT="21:30" ;;
            '30 13 * * *') SLOT="22:30" ;;
            '0 14 * * *')  SLOT="23:00" ;;
            *) echo "Unknown schedule: $SCHEDULE"; exit 1 ;;
          esac
          echo "投稿スロット: $SLOT"
          python generator/post.py tweets.json --slot "$SLOT"
